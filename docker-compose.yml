services:
  homeassistant:
    container_name: homeassistant
    image: "ghcr.io/home-assistant/home-assistant:stable"
    volumes:
      # Caminho relativo para que o projeto funcione em qualquer lugar
      - ./ha-config:/config
      # Mantém o fuso horário sincronizado com o Raspberry Pi
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped
    privileged: true
    # Essencial para que o HA descubra dispositivos na sua rede (Zigbee, WiFi, etc)
    network_mode: host

portainer:
    container_name: portainer
    image: portainer/portainer-ce:latest
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./portainer-data:/data
    ports:
      - "9443:9443"
